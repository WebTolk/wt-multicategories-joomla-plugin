PLG_SYSTEM_WTMULTICATEGORIES_WHATS_NEW = "<h3>v.1.2.0 Что нового?</h3><h4>Отдельная таблица связей</h4><p>Плагин теперь хранит связи с дополнительными категориями в отдельной таблице <code>#__wtmulticategories_map</code> и больше не читает их напрямую из значений поля в каждом frontend-запросе.</p><h4>Автоматическая синхронизация</h4><p>Сопоставление автоматически пересобирается при сохранении материалов и контактов и очищается при их удалении.</p><h4>Обновлённая логика запросов</h4><p>Списки категорий для <code>com_content</code> и <code>com_contact</code> теперь работают через map-таблицу и надежнее обрабатывают подкатегории.</p><h4>Обновление с v.1.1.0.</h4><p>Уже существующие материалы и контакты после обновления автоматически <strong>не пересобираются</strong>. Для заполнения таблицы маппинга для ранее сохраненных элементов используйте CLI-команду, например: <code>/path/to/php /path/to/joomla/cli/joomla.php wtmulticategories:rebuild-map</code></p>"
