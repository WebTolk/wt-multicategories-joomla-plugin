PLG_SYSTEM_WTMULTICATEGORIES_WHATS_NEW = "<h3>v.1.2.0 What's new?</h3><h4>Separate table of links</h4><p>The plugin now stores links to additional categories in a separate table <code>#__wtmulticategories_map</code> and no longer reads them directly from the field values in each frontend query.</p><h4>Automatic synchronization</h4><p>The mapping is automatically reassembled when materials and contacts are saved and cleared when they are deleted.</p><h4>Updated query logic</h4><p>The category lists for <code>com_content</code> and <code>com_contact</code> now work via a map table and subcategories are handled more reliably.</p><h4>Update from v.1.1.0.</h4><p>Existing materials and contacts are not automatically reassembled after the update</strong>. To fill in the mapping table for previously saved items, use the CLI command, for example: <code>/path/to/php /path/to/joomla/cli/joomla.php wtmulticategories:rebuild-map</code></p>"
