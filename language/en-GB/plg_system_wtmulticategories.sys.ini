PLG_SYSTEM_WTMULTICATEGORIES_DESC = "Allows you to add articles or contacts from other categories to categories if they are specified in the custom field. For the convenience of specifying additional Joomla categories, you can use the custom field plugin <code>WT Category</code>: <a href=\"https://web-tolk.ru/en/dev/joomla-plugins/wt-category-plagin-polzovatelskogo-polya-joomla\" target=\"_blank\">web-site</a>, <a href=\"https://extensions.joomla.org/extension/authoring-a-content/custom-fields/wt-category/\" target=\"_blank\">JED</a>, <a href=\"https://github.com/WebTolk/WT-Category-Joomla-custom-field-plugin-for-categories-selection\" target=\"_blank\">GitHub</a>"
